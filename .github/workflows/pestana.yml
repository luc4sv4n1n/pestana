name: 🏠🚁 Pestana - Veículos + Drones

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Diariamente às 8h UTC (5h BRT)

jobs:

  # ── 1. Veículos ────────────────────────────────────────────────────────────
  veiculos:
    name: 🏠 Veículos → auctions.veiculos
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests==2.31.0 python-dotenv==1.0.1 playwright==1.44.0 httpx==0.27.0

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run Pestana Veículos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIPE_TOKEN: ${{ secrets.FIPE_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}/scrapers
        run: |
          echo "🏠 PESTANA — VEÍCULOS"
          echo "📅 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          cd scrapers/pestana
          python pestana.py --output /tmp/pestana_coleta.json
          echo "✅ Veículos concluído: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Upload JSON Veículos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pestana-veiculos-${{ github.run_number }}
          path: /tmp/pestana_coleta.json
          retention-days: 3

  # ── 2. Drones (roda depois dos veículos) ───────────────────────────────────
  drones:
    name: 🚁 Drones → auctions.tecnologia
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: veiculos   # ← só começa após veículos terminar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests==2.31.0 python-dotenv==1.0.1 playwright==1.44.0 httpx==0.27.0

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run Pestana Drones
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}/scrapers
        run: |
          echo "🚁 PESTANA — DRONES"
          echo "📅 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          cd scrapers/pestana
          python drone.py --output /tmp/drone_coleta.json
          echo "✅ Drones concluído: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Upload JSON Drones
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pestana-drones-${{ github.run_number }}
          path: /tmp/drone_coleta.json
          retention-days: 3

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: 📊 Resumo
    runs-on: ubuntu-22.04
    needs: [veiculos, drones]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Generate Summary
        run: |
          echo "## 🏠🚁 Pestana — Veículos + Drones" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Data:** $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M') BRT" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏠 Veículos | ${{ needs.veiculos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚁 Drones   | ${{ needs.drones.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VEIC_JSON=$(find /tmp/artifacts -name "pestana_coleta.json" | head -1)
          DRONE_JSON=$(find /tmp/artifacts -name "drone_coleta.json" | head -1)

          if [ -f "$VEIC_JSON" ]; then
            TOTAL_V=$(python3 -c "import json; d=json.load(open('$VEIC_JSON')); print(d.get('total_lotes','?'))" 2>/dev/null || echo "?")
            FIPE_V=$(python3 -c "import json; d=json.load(open('$VEIC_JSON')); print(d.get('com_fipe','?'))" 2>/dev/null || echo "?")
            PREM_V=$(python3 -c "import json; d=json.load(open('$VEIC_JSON')); print(d.get('com_premium','?'))" 2>/dev/null || echo "?")
            echo "### 🏠 Veículos (auctions.veiculos)" >> $GITHUB_STEP_SUMMARY
            echo "- Total: **$TOTAL_V** · Com FIPE: **$FIPE_V** · Premium: **$PREM_V**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$DRONE_JSON" ]; then
            TOTAL_D=$(python3 -c "import json; d=json.load(open('$DRONE_JSON')); print(d.get('total_lotes','?'))" 2>/dev/null || echo "?")
            ML_D=$(python3 -c "import json; d=json.load(open('$DRONE_JSON')); print(d.get('com_mercado','?'))" 2>/dev/null || echo "?")
            PREM_D=$(python3 -c "import json; d=json.load(open('$DRONE_JSON')); print(d.get('com_premium','?'))" 2>/dev/null || echo "?")
            echo "### 🚁 Drones (auctions.tecnologia)" >> $GITHUB_STEP_SUMMARY
            echo "- Total: **$TOTAL_D** · Com preço ML: **$ML_D** · Premium: **$PREM_D**" >> $GITHUB_STEP_SUMMARY
          fi